<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar-customer}"></div>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h2 class="page-title text-center"><i class="fa-solid fa-credit-card"></i> Payment Details</h2>

            <div class="card p-4 shadow-sm">
                <div class="text-center mb-4">
                    <p class="fs-5">Amount Due: <span class="fw-bold text-danger fs-3">$<span th:text="${cart.getTotalValue()}"></span></span></p>
                </div>

                <form th:action="@{/order/pay}" method="post" id="paymentForm">
                    <input type="hidden" name="pickupTimeStr" th:value="${pickupTimeStr}" />

                    <div class="mb-3">
                        <label for="cardNum" class="form-label fw-bold">Card Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-credit-card"></i></span>
                            <input type="text" id="cardNum" name="cardNum" class="form-control" 
                                   placeholder="XXXX XXXX XXXX XXXX" required 
                                   pattern="[0-9]{13,19}" 
                                   title="Card must be between 13 and 19 digits with NO letters or spaces">
                        </div>
                        <div class="form-text text-danger" id="cardError" style="display:none;">Only digits are allowed!</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="expiry" class="form-label fw-bold">Expiry Date</label>
                            <input type="text" id="expiry" class="form-control" placeholder="MM/YY" required pattern="(0[1-9]|1[0-2])\/[0-9]{2}">
                        </div>
                        <div class="col-md-6">
                            <label for="cvv" class="form-label fw-bold">CVV</label>
                            <input type="text" id="cvv" class="form-control" placeholder="123" required pattern="[0-9]{3,4}">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold"><i class="fa-solid fa-circle-check"></i> Complete Payment</button>
                    
                    <div class="text-center mt-3">
                        <a href="/cart" class="text-danger">Cancel & Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    // Client-side validation to prevent typing letters
    document.getElementById("cardNum").addEventListener("input", function(e) {
        let value = this.value;
        if (/[^0-9]/.test(value)) {
            document.getElementById("cardError").style.display = "block";
        } else {
            document.getElementById("cardError").style.display = "none";
        }
        this.value = value.replace(/[^0-9]/g, "");
    });
    
    document.getElementById("cvv").addEventListener("input", function(e) {
        this.value = this.value.replace(/[^0-9]/g, "");
    });
</script>
</body>
</html>
