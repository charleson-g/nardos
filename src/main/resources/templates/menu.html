<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Menu')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar-customer}"></div>
<div class="container my-5">
    <h2 class="page-title text-center">Our Menu</h2>
    
    <div th:if="${param.error != null and param.error[0] == 'OutOfStock'}" class="alert alert-danger">
        Sorry, some items in your cart are out of stock. Please adjust quantities.
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-header text-center">
                    <h5 class="card-title mb-0" th:text="${product.name}">Product Name</h5>
                </div>
                <div class="card-body d-flex flex-column text-center">
                    <p class="card-text small text-secondary fst-italic mb-3" style="min-height: 40px;" th:text="${product.description}"></p>
                    <p class="card-text fs-4 fw-bold text-success mb-1">$<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span></p>
                    <p class="card-text small text-muted">Available: <span th:text="${product.currentQuantity}">0</span> left</p>
                    <div class="mt-auto">
                        <form th:action="@{/cart/add}" method="post" class="d-flex justify-content-center align-items-center gap-2">
                            <input type="hidden" name="productID" th:value="${product.productID}" />
                            <input type="number" name="qty" class="form-control text-center" style="width: 80px;" value="1" min="1" th:max="${product.currentQuantity}" />
                            <button type="submit" class="btn btn-primary" th:disabled="${product.currentQuantity <= 0}">
                                <i class="fa-solid fa-cart-plus"></i> Add
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
