<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Stock Report')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar-admin}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center border-bottom mb-4 pb-2">
        <h2 class="text-dark m-0"><i class="fa-solid fa-file-invoice-dollar text-primary"></i> <span th:text="${report.reportType}"></span> Stock Report</h2>
        <button class="btn btn-outline-dark" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Report</button>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 border-start border-success border-5">
                <div class="card-body">
                    <p class="text-muted mb-1 text-uppercase fw-bold">Total Items Sold</p>
                    <h3 class="card-title text-dark mb-0 fw-bold" th:text="${report.totalItemsSold}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-0 border-start border-primary border-5">
                <div class="card-body">
                    <p class="text-muted mb-1 text-uppercase fw-bold">Estimated Revenue</p>
                    <h3 class="card-title text-success mb-0 fw-bold">$<span th:text="${#numbers.formatDecimal(report.totalRevenue, 1, 2)}">0.00</span></h3>
                </div>
            </div>
        </div>
    </div>

    <h4 class="mb-3 text-secondary">Movement Log</h4>
    <div class="card shadow-sm">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Timestamp</th>
                    <th>Product ID</th>
                    <th>Type</th>
                    <th>Qty Change</th>
                    <th>User</th>
                    <th>Supplier</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movement : ${report.movements}">
                    <td th:text="${#temporals.format(movement.timestamp, 'MM/dd/yyyy hh:mm a')}"></td>
                    <td th:text="${movement.productID}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${movement.movementType == 'SALE' ? 'bg-success' : 'bg-primary'}" 
                              th:text="${movement.movementType}"></span>
                    </td>
                    <td class="fw-bold" 
                        th:classappend="${movement.quantityChanged < 0 ? 'text-danger' : 'text-success'}" 
                        th:text="${movement.quantityChanged > 0 ? '+' + movement.quantityChanged : movement.quantityChanged}">
                    </td>
                    <td th:text="${movement.username}"></td>
                    <td th:text="${movement.supplier != null ? movement.supplier : 'N/A'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(report.movements)}">
                    <td colspan="6" class="text-center text-muted">No movements found for this period.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="my-5"></div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
