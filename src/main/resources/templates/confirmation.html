<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Order Confirmed')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar-customer}"></div>
<div class="container my-5 text-center">
    <div class="card p-5 shadow-sm border-success" style="max-width: 600px; margin: 0 auto;">
        <i class="fa-solid fa-circle-check text-success" style="font-size: 5rem;"></i>
        <h2 class="page-title mt-4 mb-2 text-success">Payment Successful!</h2>
        <p class="fs-5">Your order has been placed.</p>
        
        <div class="bg-light p-3 rounded mt-3 mb-4 text-start border">
            <p><strong>Order ID:</strong> <span th:text="${orderId}">#</span></p>
            <p><strong>Total Paid:</strong> $<span th:text="${order.totalAmount}">0.00</span></p>
            <p class="mb-0"><strong>Status:</strong> <span class="badge bg-primary" th:text="${order.status}">PAID</span></p>
        </div>
        
        <a th:href="@{/order/track/{id}(id=${orderId})}" class="btn btn-outline-danger btn-lg w-100 fw-bold">
            <i class="fa-solid fa-location-crosshairs"></i> Track Order
        </a>
        <a href="/order/menu" class="btn btn-link mt-3 text-muted">Return to Menu</a>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
