<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title th:text="${title} + ' | Nardo\'s One Stop Shop'">Nardo's One Stop Shop</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Theme -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:fragment="navbar-customer" class="navbar navbar-expand-lg navbar-light mb-4">
    <div class="container">
        <a class="navbar-brand" href="/order/menu">
            <i class="fa-solid fa-hotdog"></i> Nardo's
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/order/menu">Menu</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/order/track">Track Order</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link btn btn-sm btn-outline-danger" href="/cart">
                        <i class="fa-solid fa-cart-shopping"></i> View Cart
                        <span class="badge rounded-pill bg-danger" th:if="${session.cart != null}" th:text="${session.cart.totalQuantity}">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<nav th:fragment="navbar-admin" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 admin-panel">
    <div class="container">
        <a class="navbar-brand text-light" href="/admin/dashboard" style="text-shadow: none;">
            <i class="fa-solid fa-chart-line text-warning"></i> Nardo's Admin
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link text-light" href="/admin/dashboard"><i class="fa-solid fa-store"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light" href="/admin/inventory"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light" href="/admin/report"><i class="fa-solid fa-file-invoice-dollar"></i> Reports</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="flex-shrink-0">
    <!-- Main content would be injected here -->
</main>

<footer th:fragment="footer" class="footer mt-auto py-3 bg-light text-center border-top">
    <div class="container">
        <span class="text-muted">© 2026 Nardo's One Stop Shop. Customer support: (876) 867-5309</span>
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
